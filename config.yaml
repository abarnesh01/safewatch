system:
  name: "SafeWatch Enterprise"
  version: "1.0.0"
  log_level: "DEBUG"
  device: "cpu" # Options: cpu, cuda
  save_recordings: true
  recording_path: "recordings"

cameras:
  - id: "cam_01"
    name: "Front Entrance"
    source: 0 # USB Camera or RTSP URL
    fps_limit: 15
    enabled: true
    zones:
      - name: "Entry Zone"
        points: [[0, 0], [1, 0], [1, 1], [0, 1]] # Normalized coordinates

detection:
  person_conf: 0.5
  iou_threshold: 0.45
  model_type: "yolov8n.pt" # Auto-downloads on first run

pose:
  min_detection_confidence: 0.5
  min_tracking_confidence: 0.5

threats:
  cooldown_seconds: 30
  thresholds:
    fight: 0.75
    fall: 0.8
    trespass: 0.9
    crowd_panic: 0.7
    accident: 0.8
    assault: 0.85
    harassment: 0.7
    unconscious: 0.9

alerts:
  telegram_enabled: true
  snapshot_enabled: true
  min_severity: "MEDIUM"

database:
  path: "logs/safewatch.db"
  backup_interval: 86400

security:
  secret_key: "development_secret_do_not_use_in_prod"
  session_timeout_minutes: 60
  default_admin_user: "admin"
  default_admin_pass: "safewatch_admin_2026"
